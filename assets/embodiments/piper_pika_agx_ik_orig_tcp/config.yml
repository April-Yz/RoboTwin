urdf_path: "../piper_pika_agx/piper_pika_agx.urdf"
srdf_path: "../piper_pika_agx/piper.srdf"
joint_stiffness: 1000
joint_damping: 200
gripper_stiffness: 1000
gripper_damping: 200
move_group: ["link6", "link6"]
ee_joints: ["joint6", "joint6"]
arm_joints_name:
  - ["joint1", "joint2", "joint3", "joint4", "joint5", "joint6"]
  - ["joint1", "joint2", "joint3", "joint4", "joint5", "joint6"]
gripper_name:
  - base: "left_joint"
    mimic: [["right_joint", -1.0, 0.0]]
  - base: "left_joint"
    mimic: [["right_joint", -1.0, 0.0]]
gripper_bias: 0.12
gripper_scale: [0.0, 0.05]
homestate:
  - [0.0, 0.8, 1.2, 0.0, -0.4, 0.0]
  - [0.0, 0.8, 1.2, 0.0, -0.4, 0.0]
# O.0 IK experiment:
# keep calibrated Piper/Pika URDF and base poses, but use the original RoboTwin
# Piper TCP-to-link6 convention so pick_diverse_bottles.py target poses pass
# through the same IK/planner conversion path as the built-in Piper embodiment.
delta_matrix: [[0, 0, -1], [0, 1, 0], [1, 0, 0]]
global_trans_matrix: [[0, 0, 1], [0, 1, 0], [-1, 0, 0]]
robot_pose:
  - [-0.3, -0.25, 0.75, 0.70710678, 0.0, 0.0, 0.70710678]
  - [0.5562084647094865, -0.2718422159198863, 0.7698417802711055, 0.7069488192169637, -0.0011520779568893642, 0.022118931903658524, 0.7069178117543532]
planner: "curobo"
dual_arm: false
rotate_lim: [0.2, 1]
grasp_perfect_direction: ["front_right", "front_left"]
static_camera_list:
  - name: head_camera
    type: D435
    position: [-0.032, -0.45, 1.35]
    forward: [0, 0.6, -0.8]
    left: [-1, 0, 0]
